# ════════════════════════════════════════════════════════════════════════════
# Janus load-balancing / limiting reverse proxy — ONE experiment, multiple items
#
# Topology (A = 2 fronts, B = 3 backends):
#   client ─(ws json)─▶ nginx :8080 (EDGE, RR across A) ─▶ A1, A2 (janus-front)
#                       A1, A2 ─(ws binary)─▶ nginx :8081 (B-HOP) ─▶ B1, B2, B3
#
# Experiment items (see doc/load-balance.md):
#   LB-1   front→backend load balancing  (B-HOP least_conn)          → backends ~equal
#   CONN-1 front→backend connection cap  (B-HOP limit_conn=100, per-IP) → excess conn 503
#   RATE-1 front→backend rate limit      (B-HOP limit_req 50r/s)     → excess rate 503
#   CONN-2 shared-cap starvation         (B-HOP max_conns, SHARED)   → later front starved
#          (STARVE-1: OFF by default — enable the max_conns lines below, then restart)
#   SCALE-1 backend scale up/down        (upstream server ±  + reload)  → sticky conns; churn to rebalance
#   RESTART-1 backend single restart     (max_fails eject + front auto-reconnect) → failure window + recovery
#
# A WebSocket is one HTTP/1.1 Upgrade request per connection, so on the B-HOP:
#   - limit_conn caps how many connections may be OPEN at once  (per client key = IP)
#   - limit_req  caps how fast NEW connections may be established (leaky bucket)
#   - max_conns  caps concurrent connections PER BACKEND (a SHARED pool all fronts
#     compete for → first-come monopolization; this is the CONN-2 item)
#
# Listen ports (inside the container):
#   8080 → EDGE   client WS JSON → fronts
#   8081 → B-HOP  fronts WS binary → backends  (LB-1 / CONN-1 / RATE-1 / CONN-2)
#   8090 → status (stub_status + /healthz)
#
# TUNING: edit the directives below, then reload:
#   docker compose -f docker/docker-compose.exp.yml --project-directory . \
#       exec nginx nginx -s reload
# ════════════════════════════════════════════════════════════════════════════

# Single worker so per-instance least_conn / max_conns accounting is deterministic
# (each backend's active-connection count lives in one place). This matters for
# CONN-2 (shared max_conns) and LB-2 (multi-instance nginx): with multiple workers
# each keeps its own least_conn state, blurring the effect. Throughput is
# irrelevant for these experiments.
worker_processes 1;

events {
    worker_connections 10240;
}

http {
    # Map the Upgrade header so WebSocket connections are proxied verbatim while
    # plain HTTP requests keep a normal (empty) Connection header.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── CONN-1 / RATE-1 zones (keyed by client IP) ───────────────────────────
    # NOTE: keyed by source IP → each front (distinct container IP) gets its OWN
    # quota, so limit_conn/limit_req are FAIR across fronts and do NOT starve one
    # another. Contrast this with CONN-2's max_conns, a SHARED per-backend pool.
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;             # CONN-1
    limit_req_zone  $binary_remote_addr zone=ws_req:10m rate=50r/s;   # RATE-1
    limit_conn_status 503;
    limit_req_status  503;

    # ── A tier · client → fronts (edge, round-robin per connection) ───────────
    upstream janus_fronts {
        server janus-front-a1:8080;
        server janus-front-a2:8080;
    }

    # ── LB-1 · B tier · fronts → backend WS(binary) replicas ─────────────────
    # least_conn suits long-lived WS connections: a new connection goes to the
    # backend with the fewest active connections. Request-level balancing itself
    # is done by the FRONT (least in-flight across its pool); least_conn only
    # spreads the pool's connections evenly across the backends.
    #
    # CONN-2 / STARVE-1 (OFF by default): append `max_conns=2` to each server to
    # cap B at 2×3 = 6 shared slots. With a front pool of 6, the front that
    # connects FIRST (a1) grabs all 6 and the later one (a2) is starved → its
    # forwarding pool never opens and every client request routed to it 503s.
    # Enable the max_conns below, then restart the stack (fresh connections).
    #
    # max_fails / fail_timeout drive PASSIVE health checks (RESTART-1): after 3
    # failed connection attempts within 10s nginx marks a backend DOWN and routes
    # new connections to the healthy ones; it is retried again after fail_timeout.
    # This is what lets fronts auto-recover through nginx when a backend restarts.
    #
    # SCALE-1 (scale-up, OFF by default): uncomment the janus-backend-4 line, start
    # the extra replica with `--profile scale`, then reload nginx (`nginx -s reload`).
    # Because least_conn only balances at CONNECT time and the fronts' multiplexed
    # connections are long-lived, a bare scale-up sends ~0 traffic to backend-4
    # until connections churn (e.g. restart the fronts). See doc/load-balance.md.
    upstream janus_backends {
        zone janus_backends 64k;        # global (cross-worker) conn accounting for max_conns
        least_conn;
        server janus-backend-1:8080 max_fails=3 fail_timeout=10s;   # CONN-2: add  max_conns=2
        server janus-backend-2:8080 max_fails=3 fail_timeout=10s;   # CONN-2: add  max_conns=2
        server janus-backend-3:8080 max_fails=3 fail_timeout=10s;   # CONN-2: add  max_conns=2
      # server janus-backend-4:8080 max_fails=3 fail_timeout=10s;   # SCALE-1: uncomment to scale up (+ --profile scale + reload)
    }

    # ── EDGE server · client WS JSON → fronts (unlimited: pure entry) ────────
    server {
        listen 8080;
        location / {
            proxy_pass http://janus_fronts;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }

    # ── B-HOP server · fronts WS binary → backends ───────────────────────────
    server {
        listen 8081;

        # CONN-1: per-IP concurrent-connection cap — excess conns get 503.
        limit_conn ws_conn 100;
        # RATE-1: per-IP new-connection rate cap (leaky bucket). burst absorbs
        # spikes; nodelay serves the burst immediately, so sustained excess 503s.
        limit_req  zone=ws_req burst=100 nodelay;

        location / {
            proxy_pass http://janus_backends;          # LB-1 least_conn (+ CONN-2 max_conns)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CONN-2: fail fast when every backend is at max_conns (no queue/retry)
            # so the starved front sees the rejection immediately.
            proxy_next_upstream off;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }

    # ── Status / health ──────────────────────────────────────────────────────
    server {
        listen 8090;
        location /status  { stub_status; }
        location /healthz { return 200 "ok\n"; }
    }
}
