server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect logs from all Docker containers
  - job_name: docker-container-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=janus"]
    relabel_configs:
      # Extract container name as label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container_name'
      # Extract service name from docker-compose label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      # Extract Docker image
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'job'
    pipeline_stages:
      # Parse JSON logs and extract structured fields
      - json:
          expressions:
            level: level
            logger: logger
            traceId: traceId
            spanId: spanId
            message: message
      # Add extracted fields as Loki labels
      - labels:
          level:
          logger:
          traceId:
          spanId:
