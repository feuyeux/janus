# Prometheus configuration for Janus Server
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'janus-server-I'
    static_configs:
      - targets: ['janus-server-I:9100']

  - job_name: 'janus-server-II'
    static_configs:
      - targets: ['janus-server-II:9100']

  - job_name: 'janus-server-III'
    static_configs:
      - targets: ['janus-server-III:9100']
